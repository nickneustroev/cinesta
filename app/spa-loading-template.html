<div class="cinecha-spa-shell" role="status" aria-live="polite" aria-label="Loading Cinecha">
  <style>
    .cinecha-spa-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 24rem),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.10), transparent 22rem),
        #f5f7fb;
      color: #0f172a;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
    }

    .cinecha-spa-shell__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .cinecha-spa-shell__brand {
      font-size: clamp(2.8rem, 8vw, 4.6rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .cinecha-spa-shell__spinner {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 999px;
      border: 0.35rem solid rgba(148, 163, 184, 0.22);
      border-top-color: #0f172a;
      animation: cinecha-shell-spin 0.9s linear infinite;
    }

    .cinecha-spa-shell__text {
      font-size: clamp(1rem, 2.8vw, 1.25rem);
      color: #475569;
    }

    @keyframes cinecha-shell-spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <div class="cinecha-spa-shell__content">
    <div class="cinecha-spa-shell__brand">Cinecha</div>
    <div class="cinecha-spa-shell__spinner" aria-hidden="true"></div>
    <div class="cinecha-spa-shell__text" data-loading-text>Loading project</div>
  </div>

  <script>
    (function () {
      var match = document.cookie.match(/(?:^|;\s*)i18n_lang=([^;]+)/);
      var locale = match ? decodeURIComponent(match[1]) : '';
      var isRu = locale.toLowerCase().indexOf('ru') === 0;
      var el = document.querySelector('[data-loading-text]');
      if (el) {
        el.textContent = isRu ? 'Загружаем проект' : 'Loading project';
      }
    })();
  </script>
</div>
